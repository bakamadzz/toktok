<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المفاجأة المنتظرة</title>
    <style>
        /* إعدادات الصفحة الأساسية - منع السحب تماماً */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية الهاتف القديم */
        .phone-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 850px;
            background-image: url('2117274988566708992.jpeg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* منطقة المحتوى داخل الشاشة البرتقالية المحمية */
        .screen-content {
            position: absolute;
            width: 76%;
            height: 70%;
            top: 14%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 15px;
            color: #000;
            z-index: 2;
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 25px;
            font-weight: bold;
            line-height: 1.5;
        }

        /* إطار كتابة الاسم (ستايل ريترو يشبه الهواتف القديمة وموزع كالبحث) */
        .name-input {
            width: 90%;
            max-width: 280px;
            padding: 12px 15px;
            font-size: 1.1rem;
            border: 3px solid #000;
            background-color: #fff;
            color: #000;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
            font-family: inherit;
        }

        /* حاويات الأزرار */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 280px;
        }
        
        .game-btn {
            background-color: #000;
            color: #ff9900;
            border: 2px solid #000;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .game-btn:active {
            transform: scale(0.95);
        }

        /* التأثير السينمائي عند الانتقال للفيديو */
        .cinematic-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 99;
            display: none;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* تأثير اهتزاز الشاشة */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking {
            animation: shake 0.5s;
            animation-iteration-count: infinite;
        }
    </style>
</head>
<body>

    <div class="phone-container" id="phone">
        <div class="screen-content" id="screen">
            </div>
    </div>

    <div class="cinematic-overlay" id="videoOverlay">
        <video id="giftVideo" controls playsinline>
            <source src="gift_video.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>

    <script>
        let userName = "";
        let currentStep = 0;

        const screen = document.getElementById('screen');
        const phone = document.getElementById('phone');
        const videoOverlay = document.getElementById('videoOverlay');
        const giftVideo = document.getElementById('giftVideo');

        // دالة بدء الخطوة الأولى (طلب الاسم)
        function startGame() {
            screen.innerHTML = `
                <h2>اكتبي اسمك لي مديتهلك . بسكو هاد السيت درتهلك ليك!</h2>
                <input type="text" id="nameField" class="name-input" placeholder="اكتب هنا..." autocomplete="off">
                <div class="btn-container">
                    <button class="game-btn" onclick="saveName()">تأكيد دير هادي</button>
                </div>
            `;
            
            // السماح بالكتابة داخل مربع النص دون مشاكل اللمس
            const input = document.getElementById('nameField');
            input.addEventListener('touchstart', (e) => e.stopPropagation());
        }

        // حفظ الاسم والانتقال للأسئلة المخصصة
        function saveName() {
            const input = document.getElementById('nameField');
            userName = input.value.trim();
            
            if (userName === "") {
                alert("من فضلك اكتب اسمك أولاً لتبدأ اللعبة!");
                return;
            }
            
            currentStep = 0;
            loadStep();
        }

        // دالة عرض الأسئلة اللاحقة
        function loadStep() {
            // هنا نحدد الأسئلة التي تظهر بعد كتابة الاسم
            const gameData = [
                {
                    question: `يا ترى يا ${userName}، هل تظن أنك مستعد للمفاجأة السينمائية الضخمة الآن؟`,
                    answers: ["نعم، أتحداك!", "خايف شوية 🫣"]
                },
                {
                    question: "السؤال الحاسم والأخير.. هل تعدني ألا تضحك بصوت عالٍ على الفيديو؟",
                    answers: ["أعدك بالتأكيد 🔥", "مارانيش ضامن روحي 🤣"]
                }
            ];

            if (currentStep < gameData.length) {
                let data = gameData[currentStep];
                let html = `<h2>${data.question}</h2><div class="btn-container">`;
                
                data.answers.forEach(ans => {
                    html += `<button class="game-btn" onclick="nextStep()">${ans}</button>`;
                });
                
                html += `</div>`;
                screen.innerHTML = html;
            } else {
                startCinematicTransition();
            }
        }

        function nextStep() {
            currentStep++;
            loadStep();
        }

        // الهزة الدرامية والانتقال للفيديو
        function startCinematicTransition() {
            screen.innerHTML = `<h2>جاري تحميل المفاجأة الكبرى يا ${userName}...</h2>`;
            phone.classList.add('shaking');
            
            setTimeout(() => {
                phone.classList.remove('shaking');
                videoOverlay.style.display = 'flex';
                giftVideo.play().catch(error => {
                    console.log("التشغيل التلقائي مدعوم بعد تفاعل المستخدم.");
                });
            }, 2200);
        }

        // تشغيل واجهة إدخال الاسم فور فتح الموقع
        window.onload = startGame;
    </script>
</body>
</html>
