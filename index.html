<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المفاجأة المنتظرة</title>
    <style>
        /* إعدادات الصفحة الأساسية - منع السحب تماماً */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية الهاتف القديم */
        .phone-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px; /* ليحافظ على شكل الهاتف حتى لو فُتح من كمبيوتر */
            max-height: 850px;
            background-image: url('image_e6d1e4.png'); /* اسم صورتك البرتقالية */
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* منطقة المحتوى داخل الشاشة البرتقالية المحمية */
        .screen-content {
            position: absolute;
            width: 76%; /* الأبعاد التقريبية لتناسب الشاشة البرتقالية بالداخل */
            height: 70%;
            top: 14%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 15px;
            color: #000; /* نصوص سوداء لتظهر على الخلفية البرتقالية */
            z-index: 2;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* أزرار اللعبة الطريفة */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .game-btn {
            background-color: #000;
            color: #ff9900;
            border: 2px solid #000;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .game-btn:active {
            transform: scale(0.95);
        }

        /* التأثير السينمائي والدرامي عند الانتقال للفيديو */
        .cinematic-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 99;
            display: none;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* تأثير اهتزاز الشاشة الدرامي */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking {
            animation: shake 0.5s;
            animation-iteration-count: infinite;
        }
    </style>
</head>
<body>

    <div class="phone-container" id="phone">
        <div class="screen-content" id="screen">
            </div>
    </div>

    <div class="cinematic-overlay" id="videoOverlay">
        <video id="giftVideo" controls playsinline>
            <source src="gift_video.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>

    <script>
        // مصفوفة الأسئلة والخيارات والسيناريو
        const gameData = [
            {
                question: "مرحباً بك في اللعبة السريية! هل أنت مستعد لما ينتظرك؟",
                answers: ["نعم، طبعاً!", "لا، خائف قليلاً"]
            },
            {
                question: "حسناً.. سؤال للأذكياء فقط: هل تظن أنك ستفوز بهذه الجائزة؟",
                answers: ["أنا عبقري وسأفوز", "أريد الفيديو فوراً!"]
            },
            {
                question: "السؤال الأخير والحاسم.. هل تعدني ألا تضحك بصوت عالٍ؟",
                answers: ["أعدك! 🔥", "لا أضمن نفسي 🤣"]
            }
        ];

        let currentStep = 0;

        const screen = document.getElementById('screen');
        const phone = document.getElementById('phone');
        const videoOverlay = document.getElementById('videoOverlay');
        const giftVideo = document.getElementById('giftVideo');

        // دالة لتحديث الشاشة وعرض السؤال الحالي
        function loadStep() {
            if (currentStep < gameData.length) {
                let data = gameData[currentStep];
                let html = `<h2>${data.question}</h2><div class="btn-container">`;
                
                data.answers.forEach(ans => {
                    html += `<button class="game-btn" onclick="nextStep()">${ans}</button>`;
                });
                
                html += `</div>`;
                screen.innerHTML = html;
            } else {
                startCinematicTransition();
            }
        }

        function nextStep() {
            currentStep++;
            loadStep();
        }

        // الانتقال السينمائي والدرامي من اللعبة الطريفة إلى الفيديو
        function startCinematicTransition() {
            screen.innerHTML = "<h2>جاري معالجة الجائزة...</h2>";
            
            // 1. تشغيل اهتزاز الشاشة لإضافة طابع درامي
            phone.classList.add('shaking');
            
            // 2. بعد ثانيتين يتم الانتقال للفيديو السينمائي بكامل الشاشة
            setTimeout(() => {
                phone.classList.remove('shaking');
                videoOverlay.style.display = 'flex';
                
                // تشغيل الفيديو تلقائياً
                giftVideo.play().catch(error => {
                    console.log("التشغيل التلقائي يحتاج تفاعل مستخدم أولاً (تم حله بالضغط على الزر)");
                });
            }, 2000);
        }

        // بدء اللعبة عند تحميل الصفحة
        window.onload = loadStep;
    </script>
</body>
</html>
